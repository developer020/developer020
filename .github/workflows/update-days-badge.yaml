name: Update GitHub Days Badge

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-days:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false  # important to override default token

      - name: Ensure badge directory exists
        run: mkdir -p assets/main

      - name: Calculate GitHub Days
        id: days
        run: |
          START_DATE="2022-06-01"
          TODAY=$(date -u +%Y-%m-%d)
          DAYS=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$START_DATE" +%s) ) / 86400 ))
          echo "DAYS=$DAYS" >> $GITHUB_ENV
          echo "Days since $START_DATE: $DAYS"

      - name: Generate GitHub Days Badge
        run: |
          curl -s "https://img.shields.io/badge/GitHub_Days-${DAYS}-blue?style=for-the-badge" -o assets/main/days.svg

      - name: Commit and push badge
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add assets/main/days.svg
          git diff --quiet || git commit -m "Update GitHub Days badge"
          # use GITHUB_TOKEN explicitly
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main