name: Update GitHub Days Badge

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-days:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate GitHub Days
        id: days
        run: |
          START_DATE="2022-06-01"
          TODAY=$(date -u +%Y-%m-%d)
          DAYS=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$START_DATE" +%s) ) / 86400 ))
          echo "DAYS=$DAYS" >> $GITHUB_ENV

      - name: Generate GitHub Days SVG
        run: |
          mkdir -p assets/main
          curl -s "https://img.shields.io/badge/GitHub_Days-${{ env.DAYS }}-blue?style=for-the-badge" -o assets/main/days.svg

      - name: Commit and push badge
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add assets/main/days.svg
          git diff --quiet || git commit -m "Update GitHub Days badge"
          git push