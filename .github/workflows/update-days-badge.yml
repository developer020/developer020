name: Update GitHub Days JSON

on:
  schedule:
    - cron: '0 0 * * *'  # every day at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-days:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repo
      - uses: actions/checkout@v4

      # Step 2: Calculate number of days since June 1, 2022
      - name: Calculate GitHub Days
        id: days
        run: |
          START_DATE="2022-06-01"
          TODAY=$(date -u +%Y-%m-%d)
          DAYS=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$START_DATE" +%s) ) / 86400 ))
          echo "DAYS=$DAYS" >> $GITHUB_ENV
          echo "Days since $START_DATE: $DAYS"

      # Step 3: Update JSON file
      - name: Update JSON badge
        run: |
          BADGE_FILE="assets/main/days.json"
          echo "{
            \"schemaVersion\": 1,
            \"label\": \"GitHub Days\",
            \"message\": \"${DAYS}\",
            \"color\": \"blue\"
          }" > $BADGE_FILE

      # Step 4: Commit and push JSON update
      - name: Commit JSON update
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add assets/main/days.json
          git diff --quiet || git commit -m "Update GitHub Days JSON"
          git push